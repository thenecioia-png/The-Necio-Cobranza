# fly.toml — Necio Cobranza
app = "necio-cobranza"
primary_region = "mia"   # Miami — más cercano a RD

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DATABASE_URL = ""
  FRONTEND_DIST = "/app/artifacts/necio-app/dist/public"

[deploy]
  release_command = "cd /app/lib/db && pnpm run push --config ./drizzle.config.ts"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# PostgreSQL via DATABASE_URL (sin volumen local necesario)
